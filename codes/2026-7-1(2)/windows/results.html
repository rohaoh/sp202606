<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
<title>Simulation Result</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#388bfd;--green:#3fb950;--red:#f85149;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;padding:18px;}
  h1{font-size:18px;font-weight:600;text-align:left;padding-bottom:10px;margin-bottom:6px;border-bottom:1px solid var(--border);}
  .level{font-size:14px;font-weight:600;margin-top:10px;margin-bottom:14px;}
  table{width:100%;border-collapse:collapse;margin-bottom:14px;}
  td{padding:6px 4px;border-bottom:1px solid var(--border);}
  td.k{color:var(--muted);}
  td.v{text-align:right;font-variant-numeric:tabular-nums;}
  .btns{display:flex;gap:8px;flex-wrap:wrap;}
  button{flex:1;min-width:110px;background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:9px;font-size:13px;cursor:pointer;}
  button:hover{border-color:var(--blue);}
  .empty{color:var(--muted);}
</style>
</head>
<body>
  <h1>Simulation Result</h1>
  <div class="level" id="level">—</div>
  <table><tbody id="rows"><tr><td class="empty">결과 대기 중…</td></tr></tbody></table>
  <div class="btns">
    <button id="btn-png">Save PNG</button>
    <button id="btn-xlsx">Export XLSX</button>
    <button id="btn-csv">Export CSV</button>
    <button id="btn-close">Close</button>
  </div>
  <script src="results.js"></script>
</body>
</html>
